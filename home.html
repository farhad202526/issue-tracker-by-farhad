
<!DOCTYPE html>
<html lang="en" class="bg-[#ced7dd]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Home</title>

    <!-- style -->
    <link rel="stylesheet" href="style/style.css">

    <!-- Daisy + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
 
    <!-- nevber aaa -->
      <header class="w-12/12 mx-auto">
    <div class="navbar bg-base-100 shadow-sm gap-3 px-10 flex flex-col md:flex-row">
  <div class="flex-1  ">
    <div class=" flex  flex-col items-center md:flex-row"> 
        <div><i class="fa-brands fa-github text-3xl"></i></div>
        <div class=" font-bold text-2xl ">GitHub Issues Tracker</div>
     </div>
    
  </div>
  <div class="flex gap-6 md:gap-2">
    <input id="input-search"type="text" placeholder="  Search" class="input input-bordered w-24 md:w-auto" />
    <!-- search button  -->
        <button id="btn-search" class="btn btn-primary join-item">Search</button>
       
      </div>
      
    </div>
  </div>
</div>
   </header>






    <main class="bg-[#F8FAFC] pt-[60px]">

        <!-- tabs -->
        <section class="tab-section w-9/12 mx-auto bg-white py-6 pl-6 rounded-lg mb-4">
            <div class="flex justify-center px-5 sm:justify-normal gap-3">
                <button id="all-tab" data-tab="all" class="btn btn-primary issue-tab-btn active w-[120px]">
                    All
                </button>
                <button id="open-tab" data-tab="open" class="btn btn-outline btn-primary issue-tab-btn w-[120px]">
                    Open
                </button>
                <button id="closed-tab" data-tab="closed" class="btn btn-outline btn-primary issue-tab-btn w-[120px]">
                    Closed
                </button>
            </div>
        </section>

        <!-- counter container -->
        <section class="counter w-9/12 mx-auto bg-white p-6 rounded-lg border-b border-[#E4E4E7]">
            
            <div id="counter" class="flex flex-col  sm:flex-row i justify-between gap-4">
                <div class="flex flex-col  sm:flex-row items-center gap-2">
                    <div>
                        <img class="bg-[#ECE4FF] rounded-full p-2" src="assets/Aperture.png" alt="">
                    </div>
                    <div class=" justify-center text-center sm:text-start">
                        <h1 id="issue-count" class="font-semibold text-[20px]">0 Issues</h1>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex gap-4 items-center justify-center ">
                    <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
                    <p><i class="fa-solid fa-circle text-[#d3ccd9]"></i> Closed</p>
                </div>
            </div>
        </section>

        <!-- issues container -->
        <section id="issue-container" class="counter w-9/12 mx-auto bg-white p-8 rounded-lg">
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

            </div>
        </section>

        <!-- spinner -->
         <section id="spinner" class="flex justify-center items-center py-10 w-9/12 mx-auto bg-white rounded-lg hidden">
            <span class="loading loading-dots loading-xl"></span>
         </section>

        <!-- modal -->
        <!-- Open the modal using ID.showModal() method -->
        
        <dialog id="issue_modal" class="modal">
            <div class="modal-box">

                <div id="details-container" class=" p-3 space-y-3">
                    
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>


    </main>



    <script src="style/style.home.js"></script>
</body>

</html
